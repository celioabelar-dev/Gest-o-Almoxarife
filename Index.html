  <script>
    function showModulo(id) {
      document.querySelectorAll('.modulo-container').forEach(m => m.style.display='none');
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      document.getElementById(id).style.display='block';
      document.getElementById('btn-'+id).classList.add('active');
      
      if(id === 'ModuloGestao') window.pesquisaDinamica('todos');
      if(id === 'ModuloMovimentacao') window.buscarMovimentacoes();
      if(id === 'ModuloTecnicos') window.listarTecnicos('todos');
      if(id === 'ModuloMaleta') window.prepararModuloMaleta();
      if(id === 'ModuloEntrada') window.prepararEntrada();
      // ADICIONE ESTA VERIFICAÇÃO ABAIXO
      if(id === 'ModuloRelatorios') window.carregarRelatorios();
    }
    window.onload = () => showModulo('ModuloGestao');
  </script>
